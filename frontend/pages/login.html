<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsicoManager — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="pm-login-wrap">
  <div class="pm-login-card">
    <div class="pm-login-logo">
      <div class="pm-login-icon"><i class="bi bi-heart-pulse-fill"></i></div>
      <div class="pm-login-title">PsicoManager</div>
      <div class="text-muted" style="font-size:13px">Gestão clínica integrada</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Perfil de acesso</label>
      <div class="row g-2">
        <div class="col-4">
          <div class="pm-role-btn active" data-role="psicologo" onclick="selecionarPerfil(this)">
            <i class="bi bi-person-heart"></i>Psicólogo
          </div>
        </div>
        <div class="col-4">
          <div class="pm-role-btn" data-role="administrador" onclick="selecionarPerfil(this)">
            <i class="bi bi-building"></i>Administrador
          </div>
        </div>
        <div class="col-4">
          <div class="pm-role-btn" data-role="paciente" onclick="selecionarPerfil(this)">
            <i class="bi bi-person"></i>Paciente
          </div>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com" value="admin@psicomanager.com">
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input type="password" id="senha" class="form-control" placeholder="••••••••" value="123456">
        <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
          <i class="bi bi-eye" id="olhoIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-pm w-100 py-2" id="btnLogin" onclick="fazerLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no sistema
    </button>

    <div id="erroLogin" class="alert alert-danger mt-3 py-2" style="display:none;font-size:13px"></div>

    <div class="text-center mt-3">
      <small class="text-muted">
        Usuário padrão: <strong>admin@psicomanager.com</strong> / <strong>123456</strong><br>
        (criado automaticamente na primeira execução)
      </small>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
let perfilSelecionado = 'psicologo';

function selecionarPerfil(el) {
  document.querySelectorAll('.pm-role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  perfilSelecionado = el.dataset.role;
}

function toggleSenha() {
  const campo = document.getElementById('senha');
  const icone = document.getElementById('olhoIcon');
  if (campo.type === 'password') { campo.type = 'text'; icone.className = 'bi bi-eye-slash'; }
  else { campo.type = 'password'; icone.className = 'bi bi-eye'; }
}

async function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btnLogin');
  const erro = document.getElementById('erroLogin');
  erro.style.display = 'none';
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; erro.style.display = 'block'; return; }
  btn.innerHTML = '<span class="pm-loader me-2"></span>Entrando...';
  btn.disabled = true;
  try {
    await PM.login(email, senha);
    window.location.href = '/pages/dashboard.html';
  } catch (err) {
    erro.textContent = err.message || 'E-mail ou senha incorretos.';
    erro.style.display = 'block';
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar no sistema';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
// Se já logado, redireciona
if (PM.getToken()) window.location.href = '/pages/dashboard.html';
</script>
</body>
</html>
