<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PsicoManager — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo-wrap">
      <i class="bi bi-heart-pulse-fill"></i>
    </div>
    <div class="login-title">PsicoManager</div>
    <div class="login-sub">Sistema de gestão clínica integrada</div>

    <div class="role-selector" style="margin-top:24px">
      <div class="role-btn active" data-perfil="psicologo">
        <i class="bi bi-person-heart"></i>
        <span>Psicólogo</span>
      </div>
      <div class="role-btn" data-perfil="administrador">
        <i class="bi bi-building"></i>
        <span>Administrador</span>
      </div>
      <div class="role-btn" data-perfil="paciente">
        <i class="bi bi-person"></i>
        <span>Paciente</span>
      </div>
    </div>

    <form id="formLogin" style="margin-top:20px">
      <div class="form-group">
        <label class="form-label-custom">E-mail</label>
        <input id="loginEmail" type="email" class="form-control-custom" value="ana@clinica.com" required/>
      </div>
      <div class="form-group" style="margin-top:14px;margin-bottom:20px">
        <label class="form-label-custom">Senha</label>
        <input id="loginSenha" type="password" class="form-control-custom" value="password" required/>
        <div style="font-size:12px;color:#718096;margin-top:6px">
          Senha dos usuários de exemplo: <strong>password</strong>
        </div>
      </div>

      <div id="loginErro" class="login-error"></div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Entrar no sistema
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:12px;color:#A0AEC0">
      Não tem conta? <a href="cadastro.html" style="color:var(--teal);font-weight:600;text-decoration:none">Criar conta</a>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:12px;color:#A0AEC0">
      SENAI CIMATEC &middot; IHC &middot; 2026
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>setupLogin();</script>
</body>
</html>
